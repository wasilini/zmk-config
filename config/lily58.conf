# ===== Основные настройки клавиатуры =====
CONFIG_ZMK_KEYBOARD_NAME="Lily58"
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y      # Для левой половины
# CONFIG_ZMK_SPLIT_ROLE_PERIPHERAL=y # Для правой половины (раскомментируйте в lily58_right.conf)

# ===== BLE и энергосбережение =====
CONFIG_ZMK_BLE=y
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_EXT_POWER=y

# ===== RGB Underglow =====
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=y
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_USB=y

# ===== Доступные эффекты =====
CONFIG_ZMK_RGB_UNDERGLOW_EFFECT_BREATHING=y
CONFIG_ZMK_RGB_UNDERGLOW_EFFECT_SOLID=y
CONFIG_ZMK_RGB_UNDERGLOW_EFFECT_RAINBOW_MOOD=y
CONFIG_ZMK_RGB_UNDERGLOW_EFFECT_RAINBOW_SWIRL=y
CONFIG_ZMK_RGB_UNDERGLOW_EFFECT_KELVIN=y
CONFIG_ZMK_RGB_UNDERGLOW_EFFECT_TEST=y

# ===== Энкодеры (если есть) =====
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# ===== Мышь/трекпоинт (опционально) =====
# CONFIG_ZMK_POINTING=y
